name: emr-fault-analyzer
services:
  # ================================================================
  # Ollama — Local LLM Runtime
  # BEFORE: Ollama was NOT in compose (ran separately without limits)
  # ================================================================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=1         # One request at a time (save RAM)
      - OLLAMA_MAX_LOADED_MODELS=1    # Only one model in memory
      - OLLAMA_KEEP_ALIVE=30m         # Don't unload model too quickly
    deploy:
      resources:
        limits:
          memory: 6g
          cpus: "6"
        reservations:
          memory: 3g

  # ================================================================
  # PostgreSQL — Structured EMR Data
  # BEFORE: No resource limits, no memory tuning
  # ================================================================
  postgres:
    image: pgvector/pgvector:pg17-trixie
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=emr_db
      # Memory tuning
      - POSTGRES_SHARED_BUFFERS=256MB
      - POSTGRES_WORK_MEM=16MB
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1"
        reservations:
          memory: 512m

  # ================================================================
  # Qdrant — Vector Database
  # BEFORE: No resource limits
  # ================================================================
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/data
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "2"
        reservations:
          memory: 512m

  # ================================================================
  # Neo4j — Graph Database
  # BEFORE: No resource limits, no heap tuning
  # ================================================================
  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/mypassword
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      # Heap & pagecache limits (prevent unbounded RAM usage)
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"
        reservations:
          memory: 1g

  # ================================================================
  # Redis — Cache Layer (FASE 2)
  # BEFORE: No caching infrastructure
  # ================================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1"
        reservations:
          memory: 128m

volumes:
  ollama_data:
  pgdata:
  qdrant_data:
  neo4j_data:
  redis_data:
