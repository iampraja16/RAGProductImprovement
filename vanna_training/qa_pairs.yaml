- question: "Berapa total fault per model?"
  sql: "SELECT machine_model, COUNT(*) as total FROM emr_records GROUP BY machine_model ORDER BY total DESC;"
- question: "Model apa yang paling sering rusak?"
  sql: "SELECT machine_model, COUNT(*) as total FROM emr_records GROUP BY machine_model ORDER BY total DESC LIMIT 1;"
- question: "Tampilkan 5 site dengan masalah terbanyak"
  sql: "SELECT branch_site, COUNT(*) as total FROM emr_records GROUP BY branch_site ORDER BY total DESC LIMIT 5;"
- question: "Tampilkan tren kerusakan per bulan"
  sql: "SELECT DATE_TRUNC('month', created_date) as month, COUNT(*) as total FROM emr_records GROUP BY month ORDER BY month;"
- question: "Tampilkan tren masalah pada PC200 per bulan"
  sql: "SELECT DATE_TRUNC('month', created_date) as month, COUNT(*) as total FROM emr_records WHERE model_family = 'PC200' GROUP BY month ORDER BY month;"
- question: "berikan perbandingan antara unit yang sering bermasalah dengan yang paling tidak sering bermasalah"
  sql: "(SELECT machine_model, COUNT(*) as total_faults, 'Paling Sering' as status FROM emr_records GROUP BY machine_model ORDER BY total_faults DESC LIMIT 5) UNION ALL (SELECT machine_model, COUNT(*) as total_faults, 'Paling Jarang' as status FROM emr_records GROUP BY machine_model ORDER BY total_faults ASC LIMIT 5) ORDER BY status DESC, total_faults DESC;"
- question: "perbandingan unit paling sering rusak dengan unit yang paling jarang rusak"
  sql: "(SELECT machine_model, COUNT(*) as total_faults, 'Paling Sering' as status FROM emr_records GROUP BY machine_model ORDER BY total_faults DESC LIMIT 5) UNION ALL (SELECT machine_model, COUNT(*) as total_faults, 'Paling Jarang' as status FROM emr_records GROUP BY machine_model ORDER BY total_faults ASC LIMIT 5) ORDER BY status DESC, total_faults DESC;"
- question: "Apa tema kerusakan utama (GraphRAG summary) untuk masalah pada alat PC200?"
  sql: "SELECT DISTINCT graph_community_summary FROM emr_records WHERE model_family = 'PC200' AND graph_community_summary IS NOT NULL;"
- question: "Hitung berapa banyak kasus kerusakan yang berkaitan dengan kluster Sistem Pendingin (Cooling System) menurut GraphRAG"
  sql: "SELECT COUNT(*) FROM emr_records WHERE graph_community_summary ILIKE '%Cooling System%' OR graph_community_summary ILIKE '%Sistem Pendingin%';"
- question: "Berapa banyak kasus kerusakan pada model HD785-7 yang memiliki ringkasan GraphRAG (dimana kolom graph_community_summary tidak kosong)?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE machine_model = 'HD785-7' AND graph_community_summary IS NOT NULL;"
