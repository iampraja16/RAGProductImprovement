- question: "Berapa total fault per model?"
  sql: "SELECT machine_model, COUNT(*) as total FROM emr_records GROUP BY machine_model ORDER BY total DESC;"
- question: "Model apa yang paling sering rusak?"
  sql: "SELECT machine_model, COUNT(*) as total FROM emr_records GROUP BY machine_model ORDER BY total DESC LIMIT 1;"
- question: "Tampilkan 5 site dengan masalah terbanyak"
  sql: "SELECT branch_site, COUNT(*) as total FROM emr_records GROUP BY branch_site ORDER BY total DESC LIMIT 5;"
- question: "Tampilkan tren kerusakan per bulan"
  sql: "SELECT DATE_TRUNC('month', created_date) as month, COUNT(*) as total FROM emr_records GROUP BY month ORDER BY month;"
- question: "Tampilkan tren masalah pada PC200 per bulan"
  sql: "SELECT DATE_TRUNC('month', created_date) as month, COUNT(*) as total FROM emr_records WHERE model_family = 'PC200' GROUP BY month ORDER BY month;"
- question: "berikan perbandingan antara unit yang sering bermasalah dengan yang paling tidak sering bermasalah"
  sql: "(SELECT machine_model, COUNT(*) as total_faults, 'Paling Sering' as status FROM emr_records GROUP BY machine_model ORDER BY total_faults DESC LIMIT 5) UNION ALL (SELECT machine_model, COUNT(*) as total_faults, 'Paling Jarang' as status FROM emr_records GROUP BY machine_model ORDER BY total_faults ASC LIMIT 5) ORDER BY status DESC, total_faults DESC;"
- question: "Berapa total kasus engine overheat?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE symptom ILIKE '%overheat%';"
- question: "Frekuensi engine overheat per model HD785"
  sql: "SELECT model_family, COUNT(*) FROM emr_records WHERE model_family = 'HD785' GROUP BY model_family ORDER BY count DESC;"
- question: "Tren engine overheat per bulan di tahun 2025"
  sql: "SELECT DATE_TRUNC('month', created_date) AS bulan, COUNT(*) FROM emr_records WHERE created_date >= '2025-01-01' GROUP BY bulan ORDER BY bulan;"
- question: "Berapa total kasus per community pada semua model"
  sql: "SELECT community_id, COUNT(*) FROM emr_records GROUP BY community_id ORDER BY count DESC LIMIT 20;"
- question: "Top 5 komunitas masalah terbesar"
  sql: "SELECT community_id, COUNT(*) AS total_kasus FROM emr_records GROUP BY community_id ORDER BY total_kasus DESC LIMIT 5;"
- question: "Berapa banyak kasus overheating pada semua model PC200?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE model_family = 'PC200';"
- question: "Tampilkan 5 record EMR engine overheat terbaru"
  sql: "SELECT emr_name, symptom, caused_of_problem, action_how_was_problem_corrected, model_family, created_date FROM emr_records WHERE symptom ILIKE '%overheat%' ORDER BY created_date DESC LIMIT 5;"
- question: "Komponen apa yang paling sering rusak pada kasus engine overheat?"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 10;"
- question: "Top 5 masalah yang sering terjadi?"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 5;"
- question: "Berapa total fault untuk PC200?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE machine_model ILIKE 'PC200%';"
- question: "Total fault per model untuk semua unit PC200"
  sql: "SELECT machine_model, COUNT(*) AS total FROM emr_records WHERE machine_model ILIKE 'PC200%' GROUP BY machine_model ORDER BY total DESC;"
- question: "Berapa total fault untuk unit Komatsu?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE machine_product = 'KOMAT';"
- question: "Total fault per model untuk unit Komatsu"
  sql: "SELECT machine_model, COUNT(*) AS total FROM emr_records WHERE machine_product = 'KOMAT' GROUP BY machine_model ORDER BY total DESC;"
- question: "Berapa total kasus engine overheat di unit Scania?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE machine_product = 'SCNIA';"
- question: "Total fault untuk semua unit Tadano"
  sql: "SELECT COUNT(*) FROM emr_records WHERE machine_product = 'TDANH';"
- question: "Problem apa yang sering terjadi di PAMA?"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE account_account_name ILIKE '%PAMA%' AND techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 10;"
- question: "Top 5 masalah di site MTW"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE branch_site ILIKE '%MTW%' AND techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 5;"
- question: "Masalah apa saja yang sering terjadi di account BANDANG MINING COAL?"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE account_account_name ILIKE '%BANDANG MINING%' AND techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 10;"
- question: "Berapa total kasus di branch site TJR?"
  sql: "SELECT COUNT(*) FROM emr_records WHERE branch_site ILIKE '%TJR%';"
- question: "Total masalah per komponen di site PAMA"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE account_account_name ILIKE '%PAMA%' AND techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 10;"
- question: "engine overheat terjadi di unit model apa saja dan nomor emr berapa?"
  sql: "SELECT machine_model, emr_name FROM emr_records WHERE symptom ILIKE '%overheat%' ORDER BY machine_model, emr_name;"
- question: "oli bocor terjadi di model apa saja dan apa nomor emr nya?"
  sql: "SELECT machine_model, emr_name FROM emr_records WHERE symptom ILIKE '%oli%' AND symptom ILIKE '%bocor%' ORDER BY machine_model, emr_name;"
- question: "tampilkan semua engine overheat lengkap dengan model dan nomor EMR"
  sql: "SELECT machine_model, emr_name, symptom, created_date FROM emr_records WHERE symptom ILIKE '%overheat%' ORDER BY created_date DESC;"
- question: "berapa total emr yang bahas masalah engine di PC200-10M0"
  sql: "SELECT COUNT(*) FROM emr_records WHERE machine_model = 'PC200-10M0' AND (symptom ILIKE '%engine%' OR subjects ILIKE '%engine%' OR caused_of_problem ILIKE '%engine%')"
- question: "cari emr yang membahas masalah engine"
  sql: "SELECT emr_name, machine_model, symptom FROM emr_records WHERE symptom ILIKE '%engine%' OR caused_of_problem ILIKE '%engine%' ORDER BY emr_name"
- question: "masalah apa saja yang terjadi pada PC200-10M0"
  sql: "SELECT emr_name, symptom, caused_of_problem FROM emr_records WHERE machine_model = 'PC200-10M0' ORDER BY emr_name"
- question: "berapa total emr untuk masalah engine"
  sql: "SELECT COUNT(*) FROM emr_records WHERE symptom ILIKE '%engine%' OR caused_of_problem ILIKE '%engine%' OR subjects ILIKE '%engine%'"
- question: "tampilkan emr yang ada masalah dengan mesin"
  sql: "SELECT emr_name, machine_model, symptom, caused_of_problem FROM emr_records WHERE symptom ILIKE '%engine%' OR symptom ILIKE '%mesin%' ORDER BY emr_name"
- question: "EMR apa saja di account PAMA yang berkaitan dengan engine overheat?"
  sql: "SELECT emr_name, symptom, machine_model, created_date FROM emr_records WHERE account_account_name = 'PAMAPERSADA NUSANTARA' AND symptom ILIKE '%engine%' ORDER BY emr_name;"
- question: "Berapa total EMR di account ADARO?"
  sql: "SELECT COUNT(*) AS total FROM emr_records WHERE account_account_name = 'ADARO INDONESIA' OR account_account_name = 'ADARO LOGISTICS';"
- question: "masalah apa yang sering terjadi di account FREEPORT?"
  sql: "SELECT techcare_component, COUNT(*) AS total FROM emr_records WHERE account_account_name = 'FREEPORT INDONESIA' AND techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY total DESC LIMIT 10;"
- question: "tampilkan daftar EMR engine overheat di customer PAMA lengkap dengan PPI nya"
  sql: "SELECT e.emr_name, e.symptom, e.machine_model, e.ppi_external_id, e.ppi_improvement_name FROM emr_records e WHERE e.account_account_name = 'PAMAPERSADA NUSANTARA' AND e.symptom ILIKE '%engine%' ORDER BY e.emr_name;"
- question: "masalah engine overheat di PAMA nomor EMR nya berapa dan PPI nya berapa?"
  sql: "SELECT e.emr_name, e.symptom, e.ppi_external_id, e.ppi_improvement_name FROM emr_records e WHERE e.account_account_name = 'PAMAPERSADA NUSANTARA' AND e.symptom ILIKE '%engine%' ORDER BY e.emr_name;"
- question: "total fault per model untuk account BANDANG MINING COAL"
  sql: "SELECT machine_model, COUNT(*) AS total FROM emr_records WHERE account_account_name = 'BANDANG MINING COAL' GROUP BY machine_model ORDER BY total DESC;"
- question: "tampilkan emr yang punya PPI"
  sql: "SELECT emr_name, ppi_external_id, ppi_improvement_name FROM emr_records WHERE ppi_external_id IS NOT NULL ORDER BY emr_name"
- question: "cari semua PPI yang aktif"
  sql: "SELECT DISTINCT ppi_external_id, ppi_improvement_name, ppi_phenomenon FROM emr_records WHERE ppi_external_id IS NOT NULL ORDER BY ppi_external_id"
- question: "berapa total emr yang punya PPI"
  sql: "SELECT COUNT(*) AS total_ppi_emr FROM emr_records WHERE ppi_external_id IS NOT NULL"
- question: "cari PPI PPI.000004"
  sql: "SELECT emr_name, ppi_external_id, ppi_improvement_name, ppi_phenomenon, ppi_corrective_action FROM emr_records WHERE ppi_external_id = 'PPI.000004'"
- question: "tampilkan detail PPI.000017"
  sql: "SELECT emr_name, machine_model, symptom, ppi_external_id, ppi_improvement_name, ppi_phenomenon FROM emr_records WHERE ppi_external_id = 'PPI.000017'"
- question: "PPI apa yang terdaftar untuk engine overheat"
  sql: "SELECT DISTINCT e.ppi_external_id, e.ppi_improvement_name, e.ppi_phenomenon FROM emr_records e WHERE e.ppi_external_id IS NOT NULL AND e.symptom ILIKE '%overheat%'"
- question: "berapa total PPI per model"
  sql: "SELECT machine_model, COUNT(DISTINCT ppi_external_id) AS total_ppi FROM emr_records WHERE ppi_external_id IS NOT NULL GROUP BY machine_model ORDER BY total_ppi DESC"
- question: "cari emr yang punya PPI di PC200"
  sql: "SELECT emr_name, ppi_external_id, ppi_improvement_name FROM emr_records WHERE machine_model ILIKE 'PC200%' AND ppi_external_id IS NOT NULL ORDER BY emr_name"
- question: "apakah ada PPI untuk masalah hydraulic leak"
  sql: "SELECT DISTINCT e.ppi_external_id, e.ppi_improvement_name FROM emr_records e WHERE e.ppi_external_id IS NOT NULL AND (e.symptom ILIKE '%hydraulic%' OR e.symptom ILIKE '%bocor%')"
- question: "PPI apa saja yang terkait dengan final drive"
  sql: "SELECT DISTINCT e.ppi_external_id, e.ppi_improvement_name, e.ppi_phenomenon FROM emr_records e WHERE e.ppi_external_id IS NOT NULL AND e.techcare_component = 'FINAL DRIVE'"
- question: "tampilkan emr tanpa PPI untuk engine problem"
  sql: "SELECT emr_name, machine_model, symptom FROM emr_records WHERE ppi_external_id IS NULL AND symptom ILIKE '%engine%' ORDER BY emr_name LIMIT 10"
- question: "rata rata jumlah ppi per site"
  sql: "SELECT branch_site, COUNT(DISTINCT ppi_external_id) AS total_ppi, COUNT(*) AS total_emr FROM emr_records WHERE ppi_external_id IS NOT NULL GROUP BY branch_site ORDER BY total_ppi DESC"
- question: "PPI paling sering muncul di site mana"
  sql: "SELECT branch_site, COUNT(*) AS total_ppi_emr FROM emr_records WHERE ppi_external_id IS NOT NULL GROUP BY branch_site ORDER BY total_ppi_emr DESC"
- question: "apakah PPI PPI.000004 berhubungan dengan engine"
  sql: "SELECT emr_name, symptom, ppi_external_id, ppi_improvement_name, ppi_phenomenon FROM emr_records WHERE ppi_external_id = 'PPI.000004' AND symptom ILIKE '%engine%'"
- question: "cari PPI berdasarkan phenomenon"
  sql: "SELECT DISTINCT ppi_external_id, ppi_improvement_name, ppi_phenomenon FROM emr_records WHERE ppi_external_id IS NOT NULL AND ppi_phenomenon ILIKE '%crack%'"
- question: "total emr per ppi"
  sql: "SELECT ppi_external_id, ppi_improvement_name, COUNT(*) AS total_emr FROM emr_records WHERE ppi_external_id IS NOT NULL GROUP BY ppi_external_id, ppi_improvement_name ORDER BY total_emr DESC"
- question: "model apa yang paling banyak memiliki PPI"
  sql: "SELECT machine_model, COUNT(DISTINCT ppi_external_id) AS total_ppi FROM emr_records WHERE ppi_external_id IS NOT NULL GROUP BY machine_model ORDER BY total_ppi DESC LIMIT 10"
- question: "tunjukkan masalah yang paling banyak dan tunjukkan emr nya"
  sql: "SELECT e.techcare_component, e.emr_name, e.symptom, e.caused_of_problem FROM emr_records e WHERE e.techcare_component = (SELECT techcare_component FROM emr_records WHERE techcare_component IS NOT NULL GROUP BY techcare_component ORDER BY count(*) DESC LIMIT 1) ORDER BY e.emr_name"
